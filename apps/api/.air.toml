#:schema https://json.schemastore.org/any.json

# Config file for air - Live reload for Go apps
# https://github.com/air-verse/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# Build command
cmd = "go build -o ./tmp/server ./cmd/server"
# Binary entrypoint to run
entrypoint = "./tmp/server"
# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html", "env"]
# Exclude directories
exclude_dir = ["assets", "tmp", "vendor", "testdata", "build", "node_modules"]
# Exclude files
exclude_file = []
# Exclude regex patterns
exclude_regex = ["_test.go", ".*_test\\.go"]
# Exclude unchanged files
exclude_unchanged = false
# Follow symlinks
follow_symlink = false
# Additional args for binary
args_bin = []
# Delay before restarting (ms)
delay = 1000
# Log file for build errors
log = "build-errors.log"
# Stop on error
stop_on_error = false
# Send interrupt signal
send_interrupt = false
# Kill delay
kill_delay = "0s"
# Rerun on error
rerun = false
rerun_delay = 500

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false
main_only = false
silent = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
